name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-11-jdk \
          openjdk-11-jre \
          build-essential \
          git \
          wget \
          curl \
          unzip \
          ccache \
          libncurses6 \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev

    - name: Setup Python environment
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer cython==0.29.36
        pip install -r requirements.txt

    - name: Cache buildozer and gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.gradle
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK (Debug)
      run: |
        echo "y" | buildozer android debug 2>&1 | tee build.log
      env:
        PATH: "/usr/lib/ccache:$PATH"
        CCACHE_DIR: ~/.ccache
        P4A_DEBUG: 0
        P4A_RELEASE_ARTIFACT: apk
        GRADLE_OPTS: -Xmx4096m
        JAVA_OPTS: -Xmx4096m
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    - name: List build output
      if: always()
      run: |
        echo "=== Build Output ==="
        ls -lah bin/ 2>/dev/null || echo "bin/ directory not found"
        find . -name "*.apk" -type f 2>/dev/null

    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: taskcontrol-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          build.log
          ~/.buildozer/android/platform/build-*/build.log
        if-no-files-found: ignore

    - name: Show build log tail on failure
      if: failure()
      run: |
        echo "=== Last 100 lines of build.log ==="
        tail -100 build.log 2>/dev/null || echo "No build.log found"
