name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Можно запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          default-jdk \
          default-jre \
          build-essential \
          ccache \
          git \
          libncurses6 \
          libstdc++6 \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libtool \
          autoconf \
          automake \
          pkg-config \
          libffi-dev \
          libssl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt

    - name: Cache buildozer and gradle
      uses: actions/cache@v3
      with:
        path: |
          .buildozer
          ~/.gradle
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK (Debug)
      run: |
        buildozer android debug
      env:
        P4A_DEBUG: 0
        P4A_RELEASE_ARTIFACT: apk
        GRADLE_OPTS: -Xmx4096m
        JAVA_OPTS: -Xmx4096m

    - name: List build output
      if: always()
      run: |
        echo "=== Build Output ==="
        ls -lah bin/ || echo "bin/ directory not found"
        find . -name "*.apk" -type f

    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: taskcontrol-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          .buildozer/android/platform/build-*/src/main.xml
          .buildozer/android/platform/build-*/build.log
