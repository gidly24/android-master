name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: ubuntu:22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies (complete)
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          python3 \
          python3-pip \
          python3-venv \
          openjdk-11-jdk \
          openjdk-11-jre \
          build-essential \
          ccache \
          git \
          wget \
          curl \
          unzip \
          libncurses6 \
          libstdc++6 \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libtool \
          libtool-bin \
          autoconf \
          automake \
          pkg-config \
          libffi-dev \
          libssl-dev \
          m4 \
          gettext \
          texinfo

    - name: Setup Python environment
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        python3 -m pip install --upgrade pip setuptools wheel
        pip3 install --break-system-packages buildozer cython==0.29.36
        pip3 install --break-system-packages -r requirements.txt

    - name: Cache buildozer and gradle
      uses: actions/cache@v3
      with:
        path: |
          /root/.buildozer
          /root/.gradle
          /root/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK (Debug)
      run: |
        export PATH="/usr/lib/ccache:$HOME/.local/bin:/root/.local/bin:$PATH"
        export CCACHE_DIR=~/.ccache
        echo "y" | buildozer android debug
      env:
        P4A_DEBUG: 0
        P4A_RELEASE_ARTIFACT: apk
        GRADLE_OPTS: -Xmx2048m -XX:+HeapDumpOnOutOfMemoryError
        JAVA_OPTS: -Xmx2048m
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    - name: List build output
      if: always()
      run: |
        echo "=== Build Output ==="
        ls -lah bin/ 2>/dev/null || echo "bin/ directory not found"
        find . -name "*.apk" -type f 2>/dev/null

    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: taskcontrol-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          /root/.buildozer/android/platform/build-*/build.log
        if-no-files-found: ignore
