name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3-dev \
          python3-pip \
          git \
          wget \
          curl \
          unzip \
          ccache \
          openjdk-11-jdk \
          build-essential \
          cython3

    - name: Setup Python environment
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        pip3 install kivy buildozer cython

    - name: Install Kivy dependencies
      run: |
        pip3 install -r requirements.txt

    - name: Cache buildozer and gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.gradle
          ~/.android
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Install autotools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          m4 \
          pkg-config
        sudo libtoolize --install --force --verbose
    
    - name: Build APK (Debug)
      run: |
        export PATH="/usr/lib/ccache:$PATH"
        export CCACHE_DIR=~/.ccache
        echo "y" | buildozer android debug
      env:
        P4A_DEBUG: 0
        P4A_RELEASE_ARTIFACT: apk
        GRADLE_OPTS: -Xmx3072m -XX:+HeapDumpOnOutOfMemoryError
        JAVA_OPTS: -Xmx3072m

    - name: List build output
      if: always()
      run: |
        echo "=== Build Output ==="
        ls -lah bin/ 2>/dev/null || echo "bin/ directory not found"
        find . -name "*.apk" -type f 2>/dev/null

    - name: Upload APK as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: taskcontrol-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          ~/.buildozer/android/platform/build-*/build.log
          .buildozer/android/platform/build-*/build.log
        if-no-files-found: ignore
